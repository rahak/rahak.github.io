<div class="blurb">
	<h1></h1>
	<p>To be aware of every moment,
	   to find my voice unscathed and
	   hidden deep within me, to pour
           it out with no modesty, to leave 
	   every chain behind and laugh at it,
	   to live life as it haunts me and to
	   haunt it back.</p>
